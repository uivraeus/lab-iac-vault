---
- name: Get Vault status
  ansible.builtin.include_role:
    name: vault_status
  vars:
    vault_status_addr: "{{ vault_unseal_addr }}"

- name: Verify unseal key env vars are set
  ansible.builtin.assert:
    that: lookup('env', 'VAULT_UNSEAL_KEY_' + (item | string)) != ''
    fail_msg: "VAULT_UNSEAL_KEY_{{ item }} environment variable is not set"
  loop: "{{ range(1, vault_unseal_key_count + 1) | list }}"
  when: vault_status_sealed

- name: Apply unseal keys
  ansible.builtin.command: "vault operator unseal {{ lookup('env', 'VAULT_UNSEAL_KEY_' + (item | string)) }}"
  environment:
    VAULT_ADDR: "{{ vault_unseal_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_unseal_tls_skip_verify | lower }}"
  loop: "{{ range(1, vault_unseal_key_count + 1) | list }}"
  when: vault_status_sealed
  changed_when: true
  no_log: true

- name: Verify Vault is unsealed
  ansible.builtin.command: vault status -format=json
  environment:
    VAULT_ADDR: "{{ vault_unseal_addr }}"
    VAULT_SKIP_VERIFY: "{{ vault_unseal_tls_skip_verify | lower }}"
  register: vault_unseal_verify_result
  changed_when: false
  when: vault_status_sealed

- name: Assert Vault is unsealed
  ansible.builtin.assert:
    that: not (vault_unseal_verify_result.stdout | from_json).sealed
    fail_msg: "Vault is still sealed after applying {{ vault_unseal_key_count }} keys"
  when: vault_status_sealed
