---
- name: Generate intermediate CA CSR
  ansible.builtin.command: >-
    vault write -format=json {{ vault_pki_int_path }}/intermediate/generate/internal
    common_name="{{ vault_pki_int_common_name }}"
    ttl="{{ vault_pki_int_ttl }}"
  environment:
    VAULT_ADDR: "{{ vault_pki_addr }}"
    VAULT_TOKEN: "{{ lookup('env', 'VAULT_ROOT_TOKEN') }}"
    VAULT_SKIP_VERIFY: "{{ vault_pki_tls_skip_verify | lower }}"
  register: vault_pki_csr_result
  changed_when: true

- name: Write CSR to temp file
  ansible.builtin.copy:
    content: "{{ (vault_pki_csr_result.stdout | from_json).data.csr }}"
    dest: /tmp/vault-int-csr.pem
    mode: "0600"

- name: Sign intermediate CSR with root CA
  ansible.builtin.command: >-
    vault write -format=json {{ vault_pki_root_path }}/root/sign-intermediate
    csr=@/tmp/vault-int-csr.pem
    format=pem_bundle
    ttl="{{ vault_pki_int_ttl }}"
  environment:
    VAULT_ADDR: "{{ vault_pki_addr }}"
    VAULT_TOKEN: "{{ lookup('env', 'VAULT_ROOT_TOKEN') }}"
    VAULT_SKIP_VERIFY: "{{ vault_pki_tls_skip_verify | lower }}"
  register: vault_pki_signed_result
  changed_when: true

- name: Write signed certificate to temp file
  ansible.builtin.copy:
    content: "{{ (vault_pki_signed_result.stdout | from_json).data.certificate }}"
    dest: /tmp/vault-int-signed.pem
    mode: "0600"

- name: Import signed certificate into intermediate mount
  ansible.builtin.command: >-
    vault write -format=json {{ vault_pki_int_path }}/intermediate/set-signed
    certificate=@/tmp/vault-int-signed.pem
  environment:
    VAULT_ADDR: "{{ vault_pki_addr }}"
    VAULT_TOKEN: "{{ lookup('env', 'VAULT_ROOT_TOKEN') }}"
    VAULT_SKIP_VERIFY: "{{ vault_pki_tls_skip_verify | lower }}"
  register: vault_pki_import_result
  changed_when: true

- name: Remove temp CSR file
  ansible.builtin.file:
    path: /tmp/vault-int-csr.pem
    state: absent

- name: Remove temp signed cert file
  ansible.builtin.file:
    path: /tmp/vault-int-signed.pem
    state: absent
