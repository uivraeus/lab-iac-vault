---
- name: Install Vault
  hosts: all
  become: true
  pre_tasks:
    - name: Get Vault status
      ansible.builtin.include_role:
        name: vault_status

    - name: Abort if Vault is already bootstrapped
      ansible.builtin.fail:
        msg: >-
          Vault is already initialized on {{ inventory_hostname }}.
          Run reset.yml first if you intend to start fresh.
      when: vault_status_initialized

  roles:
    - role: vault_install

- name: Initialize and unseal Vault
  hosts: all
  become: false
  vars:
    vault_init_output_dir: "{{ playbook_dir }}/../../../local"
  roles:
    - role: vault_init
